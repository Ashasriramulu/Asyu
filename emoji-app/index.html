<!DOCTYPE html>
<html>
<head>
<title>Emoji Chat App</title>
<style>
body{
  font-family: Arial;
  text-align:center;
  margin-top:120px;
  background:#f5f5f5;
}

.emoji{
  font-size:50px;
  cursor:pointer;
  margin:15px;
}

.chat-box{
  margin-top:40px;
  display:inline-block;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  font-size:20px;
  min-width:250px;
}
</style>
</head>

<body>

<h2>Click an Emoji</h2>

<div>
<span class="emoji" onclick="showMsg('Please be happy with me da YUG🤩 😊')">😊</span>
<span class="emoji" onclick="showMsg('Oh no! Why sad . please forgive me if i hurted you . sorry ra 😢')">😢</span>
<span class="emoji" onclick="showMsg('Yayyyyyyyy!! my yug is chill now .Feeling cool 😎')">😎</span>
</div>

<div class="chat-box" id="message">
Click an emoji to see a message
</div>

<script>
function showMsg(text){
document.getElementById("message").innerHTML=text;
}
</script>

</body>
</html>
